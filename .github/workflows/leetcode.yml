const fs = require('fs');

const LEETCODE_USERNAME = '_sa____ad_';
const README_PATH = './README.md';

async function fetchLeetCodeStats() {
  const query = `
    query getUserProfile($username: String!) {
      matchedUser(username: $username) {
        submitStatsGlobal {
          acSubmissionNum {
            difficulty
            count
          }
        }
        streak {
          curStreak
        }
      }
    }
  `;

  try {
    const response = await fetch('https://leetcode.com/graphql', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        query,
        variables: { username: LEETCODE_USERNAME }
      })
    });

    const data = await response.json();
    
    if (!data.data || !data.data.matchedUser) {
      throw new Error('User not found');
    }

    const user = data.data.matchedUser;
    const submissions = user.submitStatsGlobal.acSubmissionNum;
    const streak = user.streak.curStreak;

    let easy = 0, medium = 0, hard = 0;
    submissions.forEach(item => {
      if (item.difficulty === 'Easy') easy = item.count;
      if (item.difficulty === 'Medium') medium = item.count;
      if (item.difficulty === 'Hard') hard = item.count;
    });

    return {
      total: easy + medium + hard,
      easy,
      medium,
      hard,
      streak
    };
  } catch (error) {
    console.error('Error fetching LeetCode stats:', error);
    process.exit(1);
  }
}

function updateReadme(stats) {
  let readmeContent = fs.readFileSync(README_PATH, 'utf8');

  // Update Total Solved badge
  readmeContent = readmeContent.replace(
    /Total_Solved-\d+/,
    `Total_Solved-${stats.total}`
  );

  // Update Easy badge
  readmeContent = readmeContent.replace(
    /Easy-\d+/,
    `Easy-${stats.easy}`
  );

  // Update Medium badge
  readmeContent = readmeContent.replace(
    /Medium-\d+/,
    `Medium-${stats.medium}`
  );

  // Update Hard badge
  readmeContent = readmeContent.replace(
    /Hard-\d+/,
    `Hard-${stats.hard}`
  );

  // Update Streak badge
  readmeContent = readmeContent.replace(
    /Current_Streak-\d+_Days/,
    `Current_Streak-${stats.streak}_Days`
  );

  fs.writeFileSync(README_PATH, readmeContent, 'utf8');
  console.log(`✅ README updated successfully!`);
  console.log(`📊 Stats: ${stats.total} total | Easy: ${stats.easy} | Medium: ${stats.medium} | Hard: ${stats.hard} | Streak: ${stats.streak}`);
}

(async () => {
  console.log('🔄 Fetching LeetCode stats...');
  const stats = await fetchLeetCodeStats();
  updateReadme(stats);
})();
