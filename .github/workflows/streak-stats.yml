name: Update streak stats

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create profile folder
        run: mkdir -p profile

      - name: Download streak stats
        run: |
          curl -o profile/streak.svg "https://streak-stats.demolab.com?user=${{ github.repository_owner }}&theme=default"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/streak.svg
          git commit -m "Update streak stats" || exit 0
          git push
