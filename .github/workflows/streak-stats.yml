name: Update Streak Stats

on:
  schedule:
    - cron: "0 3 * * *"   # runs daily at 3 AM UTC
  workflow_dispatch:        # manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create profile folder
        run: mkdir -p profile

      - name: Download streak stats (dark theme)
        run: |
          curl -f -o profile/streak.svg \
            "https://streak-stats.demolab.com?user=${{ github.repository_owner }}&theme=tokyonight-duo&hide_border=true&border_radius=14&background=0d1117" \
            || echo "⚠️ Streak stats fetch failed, keeping old file"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/streak.svg
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update streak stats [skip ci]"
          git push
